<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Shield background -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield icon -->
  <path d="M 20 10 L 30 5 L 40 10 L 40 25 Q 40 35 30 40 Q 20 35 20 25 Z" 
        fill="url(#shieldGradient)" stroke="#4fc3f7" stroke-width="1.5"/>
  
  <!-- Checkmark inside shield -->
  <path d="M 25 23 L 28 27 L 35 18" 
        fill="none" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Assurit text -->
  <text x="50" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3c72">
    Assurit
  </text>
  
  <!-- Tagline -->
  <text x="50" y="45" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4fc3f7">
    Insurance Solutions
  </text>
</svg>
